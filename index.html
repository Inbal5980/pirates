<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סקילז (Skillz) - פיראטים</title>
    <!-- טעינת ספריות עיצוב וקוד -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- פונטים ואיקונים -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Assistant', sans-serif; overflow-x: hidden; }
        .glass-effect { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        .pirate-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 m-0 p-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- הגדרות ליבה ---
        const apiKey = "AIzaSyCxejliuGdzis9rFxPHELjLgNBdwbhkoKQ"; 
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyCRjV9cljtANAiAJX4gIVwr-deYISSLIQOOT_-E2Xlkcaxo-b7MQLaLjyOOlUsIOwiFA/exec";

        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // פונקציית יצירת התמונה
        const generatePirateImage = async (base64Image, role, mimeType = "image/jpeg") => {
          let description = "a smiling pirate";
          
          try {
            const visionResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [
                    { text: "Describe the facial features (gender, hair color, eye color, glasses, beard, expression) in one clear sentence. Start with 'A person with...'" },
                    { inlineData: { mimeType, data: base64Image } }
                  ]
                }]
              })
            });
            const visionData = await visionResponse.json();
            description = visionData.candidates?.[0]?.content?.parts?.[0]?.text || description;
          } catch (e) { console.error("Vision error", e); }

          const prompt = `A professional 3D Pixar/Disney style animation render of a pirate character. ${description}. The pirate is wearing stylish gear and accessories representing their role as a ${role}. Bright studio lighting, clean background, 8k resolution, profile picture style.`;

          try {
            const imgResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                instances: { prompt: prompt },
                parameters: { sampleCount: 1 }
              })
            });
            const result = await imgResponse.json();
            return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
          } catch (error) {
            console.error("Image gen error", error);
            return null;
          }
        };

        const App = () => {
          const [step, setStep] = useState(0);
          const [messages, setMessages] = useState([
            { sender: 'bot', text: 'אהוי חבר סיפון! 🏴‍☠️ ברוכים הבאים למפגש החברה של סקילז (Skillz). אני הולך להפוך אותך לפיראט אמיתי! מוכן לצאת להפלגה?' }
          ]);
          const [inputText, setInputText] = useState('');
          const [userData, setUserData] = useState({ name: '', role: '', projects: '' });
          const [isGenerating, setIsGenerating] = useState(false);
          const [generatedImage, setGeneratedImage] = useState(null);
          const messagesEndRef = useRef(null);

          useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

          const sendToSheets = (imgUrl) => {
            if (!googleScriptUrl) return;
            fetch(googleScriptUrl, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'text/plain' },
              body: JSON.stringify({ ...userData, imageUrl: "תמונה הופקה" })
            });
          };

          const addBotMessage = (text) => {
            setTimeout(() => { setMessages(prev => [...prev, { sender: 'bot', text }]); }, 600);
          };

          const handleSend = (e) => {
            e.preventDefault();
            if (!inputText.trim()) return;

            const text = inputText.trim();
            setMessages(prev => [...prev, { sender: 'user', text }]);
            setInputText('');

            if (step === 1) {
              setUserData(p => ({ ...p, name: text }));
              addBotMessage('שם של קפטנים! ומה התפקיד שלך בחברה?');
              setStep(2);
            } else if (step === 2) {
              setUserData(p => ({ ...p, role: text }));
              addBotMessage('הבנתי... ומהם הפרויקטים המרכזיים שהובלת בחודשים האחרונים?');
              setStep(3);
            } else if (step === 3) {
              setUserData(p => ({ ...p, projects: text }));
              addBotMessage('שלל מרשים בהחלט! 💰 עכשיו, צלם או העלה תמונת פנים ברורה כדי שנתאים את הדמות למראה שלך.');
              setStep(4);
            }
          };

          const handlePhoto = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
              const base64 = ev.target.result.split(',')[1];
              setMessages(prev => [...prev, { sender: 'user', text: 'העליתי תמונה!', isImg: true, url: ev.target.result }]);
              setIsGenerating(true);
              
              const pirateImg = await generatePirateImage(base64, userData.role);
              
              if (pirateImg) {
                setGeneratedImage(pirateImg);
                sendToSheets();
                addBotMessage('הו הא! תראו את הפיראט הזה! הנתונים שלך נשמרו בספר הספינה של סקילז.');
                setStep(5);
              } else {
                addBotMessage('סערה בים! משהו השתבש ביצירת התמונה. נסי שוב.');
              }
              setIsGenerating(false);
            };
            reader.readAsDataURL(file);
          };

          return (
            <div className="flex flex-col h-screen relative overflow-hidden">
              <div className="fixed inset-0 bg-[url('https://i.imgur.com/DqpMeCD.png')] bg-cover bg-center -z-20"></div>
              <div className="fixed inset-0 bg-slate-950/70 -z-10"></div>

              <header className="glass-effect p-4 border-b border-amber-500/30 flex items-center justify-between shadow-xl z-10">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 pirate-gradient rounded-full flex items-center justify-center border border-amber-400">
                    <i className="fas fa-skull-crossbones text-white"></i>
                  </div>
                  <div className="text-right">
                    <h1 className="font-bold text-amber-500 text-lg">Skillz Pirates</h1>
                    <p className="text-[10px] text-slate-400">מפגש חברה - ספינת סקילז</p>
                  </div>
                </div>
                <i className="fas fa-anchor text-amber-700/50 text-xl animate-float"></i>
              </header>

              <main className="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
                {messages.map((m, i) => (
                  <div key={i} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[85%] p-3 rounded-2xl shadow-lg ${m.sender === 'user' ? 'bg-amber-600 text-white rounded-br-none shadow-amber-900/40' : 'glass-effect border border-slate-700 text-slate-200 rounded-bl-none shadow-black/40'}`}>
                      {m.isImg ? <img src={m.url} className="w-48 rounded-lg border-2 border-amber-500" /> : <p className="text-sm leading-relaxed">{m.text}</p>}
                    </div>
                  </div>
                ))}
                
                {isGenerating && (
                  <div className="flex justify-start">
                    <div className="glass-effect border border-slate-700 p-3 rounded-2xl flex items-center gap-3">
                      <i className="fas fa-compass text-amber-500 animate-spin"></i>
                      <span className="text-xs text-amber-400 font-bold">הקפטן מעבד את התמונה...</span>
                    </div>
                  </div>
                )}
                
                {step === 5 && generatedImage && (
                  <div className="flex flex-col items-center gap-5 mt-6 animate-float">
                    <div className="p-2 bg-amber-500 rounded-2xl shadow-2xl">
                        <img src={generatedImage} className="w-64 h-64 object-cover rounded-xl border-4 border-slate-900" alt="Pirate Avatar" />
                    </div>
                    <a href={generatedImage} download={`Pirate_${userData.name}.png`} className="pirate-gradient px-8 py-3 rounded-full text-slate-950 font-bold shadow-xl flex items-center gap-2 hover:scale-105 transition-all">
                        <i className="fas fa-download"></i> הורד תמונת וואטסאפ
                    </a>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </main>

              <footer className="glass-effect border-t border-slate-800 p-4 fixed bottom-0 w-full shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                <div className="max-w-2xl mx-auto">
                  {step === 0 && (
                    <button onClick={() => { setStep(1); addBotMessage('מעולה! בוא נתחיל. מה שמך המלא, שודד ים?'); }} className="w-full pirate-gradient py-4 rounded-xl font-bold text-slate-950 shadow-lg text-lg">
                        מוכנים להפלגה! ⚓
                    </button>
                  )}
                  
                  {step > 0 && step < 4 && (
                    <form onSubmit={handleSend} className="flex gap-2">
                      <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} placeholder="כתבו כאן..." className="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-amber-500 outline-none text-white" autoFocus />
                      <button type="submit" className="pirate-gradient w-12 h-12 rounded-xl flex items-center justify-center text-slate-950 text-xl transition-transform active:scale-90"><i className="fas fa-paper-plane"></i></button>
                    </form>
                  )}

                  {step === 4 && !isGenerating && (
                    <div className="relative">
                      <input type="file" accept="image/*" onChange={handlePhoto} className="absolute inset-0 opacity-0 cursor-pointer z-10" />
                      <button className="w-full pirate-gradient py-4 rounded-xl font-bold text-slate-950 shadow-lg flex items-center justify-center gap-2 text-lg">
                        <i className="fas fa-camera"></i> צלם או העלה תמונה
                      </button>
                    </div>
                  )}
                  
                  {step === 5 && <button onClick={() => window.location.reload()} className="w-full border border-slate-700 py-3 rounded-xl text-xs text-slate-500 hover:text-slate-300">התחל מהתחלה</button>}
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
